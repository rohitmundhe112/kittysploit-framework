id: bug-bounty-safe
version: "1"
name: Bug Bounty (Safe)
description: >
  Low-impact bug bounty recon — passive OSINT, login detection, CORS review, and
  debug leak checks without aggressive fuzzing or exploitation.
tags: [bug-bounty, safe, passive]
policy:
  safe_only: true
continue_on_failure: true
variables:
  target:
    description: In-scope hostname or URL
    required: true
  port: "443"
  ssl: "true"
start_step: passive_surface
steps:
  passive_surface:
    module: auxiliary/osint/domain_surface_mapper
    description: Passive DNS, CT, and header mapping
    options:
      target: "${target}"
      check_subdomains: "true"
      check_headers: "true"
      max_subdomains: "30"
    on_success: passive_dns
    on_failure: passive_dns
  passive_dns:
    module: auxiliary/osint/passive_dns_aggregator
    description: Passive CT and permutation subdomain aggregation
    options:
      target: "${target}"
      include_ct: "true"
      include_permutations: "true"
      resolve_a: "false"
    on_success: waf_fingerprint
    on_failure: waf_fingerprint
  waf_fingerprint:
    module: scanner/http/waf_fingerprint
    description: WAF/CDN fingerprint from headers and blocking behavior
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
      path: "/"
    on_success: login_detect
    on_failure: login_detect
  login_detect:
    module: auxiliary/scanner/http/login_page_detector
    description: Login and auth page discovery
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: cors_review
    on_failure: cors_review
  cors_review:
    module: auxiliary/scanner/http/cors_misconfig
    description: CORS misconfiguration (read-only probes)
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: debug_leaks
    on_failure: debug_leaks
  debug_leaks:
    module: auxiliary/scanner/http/debug_info_leak
    description: Debug and stack trace leakage
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
      depth: "1"
    on_success: null
    on_failure: null
