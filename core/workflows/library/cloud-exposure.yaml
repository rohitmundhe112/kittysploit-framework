id: cloud-exposure
version: "1"
name: Cloud Exposure
description: >
  Detect cloud metadata paths, AWS S3/Azure/GCP storage exposure, and related misconfigurations.
tags: [cloud, exposure, quick-win]
policy:
  safe_only: true
continue_on_failure: true
variables:
  target:
    description: HTTP(S) target URL or hostname
    required: true
  port: "443"
  ssl: "true"
  storage_account:
    description: Azure storage account name for queue/table/file probe (optional)
    default: ""
start_step: metadata_paths
steps:
  metadata_paths:
    module: scanner/cloud/cloud_metadata_detect
    description: Cloud metadata path exposure (IMDS / SSRF vectors)
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: aws_s3
    on_failure: aws_s3
  aws_s3:
    module: scanner/cloud/aws_s3_detect
    description: AWS S3 bucket/API exposure
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: aws_s3_listing
    on_failure: aws_s3_listing
  aws_s3_listing:
    module: scanner/cloud/aws_s3_public_listing_detect
    description: Public S3 bucket listing
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: azure_blob
    on_failure: azure_blob
  azure_blob:
    module: scanner/cloud/azure_blob_detect
    description: Azure blob storage exposure
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: gcp_storage
    on_failure: gcp_storage
  gcp_storage:
    module: scanner/cloud/gcp_storage_detect
    description: GCP storage bucket exposure
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: k8s_api
    on_failure: k8s_api
  k8s_api:
    module: scanner/cloud/kubernetes_api_detect
    description: Exposed Kubernetes API
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: aws_public_endpoints
    on_failure: aws_public_endpoints
  aws_public_endpoints:
    module: scanner/cloud/aws_public_endpoint_detect
    description: AWS Lambda Function URLs and API Gateway exposure
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: azure_storage_services
    on_failure: azure_storage_services
  azure_storage_services:
    module: scanner/cloud/azure_storage_service_probe
    description: Azure Queue, Table, and File anonymous exposure
    options:
      account: "${storage_account}"
      services: "queue,table,file"
    on_success: azure_functions
    on_failure: azure_functions
  azure_functions:
    module: scanner/cloud/azure_functions_detect
    description: Azure Functions / App Service platform
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: gcp_cloud_run
    on_failure: gcp_cloud_run
  gcp_cloud_run:
    module: scanner/cloud/gcp_cloud_run_detect
    description: GCP Cloud Run service
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: aws_elasticbeanstalk
    on_failure: aws_elasticbeanstalk
  aws_elasticbeanstalk:
    module: scanner/cloud/aws_elasticbeanstalk_detect
    description: AWS Elastic Beanstalk environment
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: null
    on_failure: null
