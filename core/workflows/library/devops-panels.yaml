id: devops-panels
version: "1"
name: DevOps Panels & Misconfig Discovery
description: >
  HTTP panel and misconfiguration sweep — DevOps UIs, observability stacks,
  secrets exposure, and Java CVE fingerprints (Log4Shell / Spring4Shell).
tags: [discovery, scanner, devops, panels, misconfig, quick-win]
policy:
  safe_only: true
continue_on_failure: true
variables:
  target:
    description: Target hostname or URL
    required: true
  port: "443"
  ssl: "true"
start_step: spring_actuator
steps:
  spring_actuator:
    module: scanner/http/spring_actuator_detect
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: spring_cloud_gateway
    on_failure: spring_cloud_gateway
  spring_cloud_gateway:
    module: scanner/http/spring_cloud_gateway_detect
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: gitlab_panel
    on_failure: gitlab_panel
  gitlab_panel:
    module: scanner/http/gitlab_detect
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: jira_panel
    on_failure: jira_panel
  jira_panel:
    module: scanner/http/jira_detect
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: confluence_panel
    on_failure: confluence_panel
  confluence_panel:
    module: scanner/http/confluence_detect
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: confluence_preauth
    on_failure: confluence_preauth
  confluence_preauth:
    module: scanner/http/confluence_preauth_detect
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: jenkins_panel
    on_failure: jenkins_panel
  jenkins_panel:
    module: scanner/http/jenkins_detect
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: sonarqube_panel
    on_failure: sonarqube_panel
  sonarqube_panel:
    module: scanner/http/sonarqube_detect
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: harbor_panel
    on_failure: harbor_panel
  harbor_panel:
    module: scanner/http/harbor_detect
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: argocd_panel
    on_failure: argocd_panel
  argocd_panel:
    module: scanner/http/argocd_detect
    options:
      target: "${target}"
      port: "${port}"
      ssl: "${ssl}"
    on_success: k8s_dashboard
    on_failure: k8s_dashboard
  k8s_dashboard:
